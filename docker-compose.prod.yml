# ── Madrid Dental Studio · Producción (Dokploy) ───────────────────────
# La base de datos PostgreSQL ya existe como servicio aparte en Dokploy
# (host: app-madrid-db-qfgme1), por eso aquí NO se define un contenedor de
# Postgres. El backend la alcanza a través de la red compartida
# `dokploy-network`.
#
# En Dokploy: tipo "Docker Compose", Compose File = docker-compose.prod.yml.
# Define las variables de entorno (ver .env.production.example) en la pestaña
# "Environment" de Dokploy: Dokploy las escribe en un .env que docker compose
# carga e interpola en los ${VAR} de abajo. (No se usa env_file porque ese
# archivo está gitignored y no existe en el repo clonado.)

services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-Madrid Dental Studio}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-3}
      POSTGRES_SERVER: ${POSTGRES_SERVER}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-[]}
      FIRST_SUPERUSER_EMAIL: ${FIRST_SUPERUSER_EMAIL}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD}
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - internal
      - dokploy-network
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal
      - dokploy-network
    # ── Enrutado de Traefik ───────────────────────────────────────────
    # En apps Compose, Dokploy NO inyecta labels: hay que declararlos aquí.
    # IMPORTANTE: NO añadir además un dominio en la pestaña "Domains" de la
    # UI o se crean routers duplicados para el mismo host (= 404).
    labels:
      - traefik.enable=true
      # El contenedor está en 2 redes; Traefik debe enrutar por la de Dokploy.
      - traefik.docker.network=dokploy-network
      # HTTP (80)
      - traefik.http.routers.madrid-http.rule=Host(`madrid.ose.net.pe`)
      - traefik.http.routers.madrid-http.entrypoints=web
      - traefik.http.routers.madrid-http.service=madrid-frontend
      # HTTPS (443) + Let's Encrypt
      - traefik.http.routers.madrid-https.rule=Host(`madrid.ose.net.pe`)
      - traefik.http.routers.madrid-https.entrypoints=websecure
      - traefik.http.routers.madrid-https.tls=true
      - traefik.http.routers.madrid-https.tls.certresolver=letsencrypt
      - traefik.http.routers.madrid-https.service=madrid-frontend
      # Puerto del contenedor (nginx)
      - traefik.http.services.madrid-frontend.loadbalancer.server.port=80

volumes:
  backend_uploads:

networks:
  # Red privada para el tráfico frontend ⇄ backend.
  internal:
    driver: bridge
  # Red de Dokploy (Traefik + la BD ya creada). Debe existir previamente.
  dokploy-network:
    external: true
