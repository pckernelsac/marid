# ── Madrid Dental Studio · Producción (Dokploy / Docker Swarm) ────────
# La base de datos PostgreSQL ya existe como servicio aparte en Dokploy
# (host: app-madrid-db-qfgme1); el backend la alcanza por `dokploy-network`.
#
# DISEÑO MULTI-PROYECTO (varios proyectos en el mismo VM/Dokploy):
#  • Dokploy usa Docker Swarm y TODOS los proyectos comparten `dokploy-network`.
#    En Swarm cada servicio registra su NOMBRE como alias DNS en esa red, así
#    que dos proyectos con un servicio `frontend`/`backend` COLISIONAN (una app
#    termina cargando la otra). Por eso:
#       1) Los servicios llevan nombres ÚNICOS con prefijo `madrid-`.
#       2) El tráfico interno (nginx ⇄ backend) va por una red PRIVADA propia
#          (`madrid-internal`), no por la compartida. `dokploy-network` se usa
#          solo para alcanzar la BD y para que Traefik exponga el frontend.
#  • El dominio se configura SOLO desde la pestaña "Domains" de Dokploy
#    (Service: madrid-frontend · Port: 80 · HTTPS + Let's Encrypt). NO declarar
#    labels de Traefik aquí: Dokploy los inyecta y duplicarlos provoca 404.
#  • Variables de entorno: pestaña "Environment" de Dokploy (ver
#    .env.production.example); se interpolan en los ${VAR}. No se usa env_file
#    (gitignored, no está en el repo clonado).

services:
  madrid-backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-Madrid Dental Studio}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-3}
      POSTGRES_SERVER: ${POSTGRES_SERVER}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-[]}
      FIRST_SUPERUSER_EMAIL: ${FIRST_SUPERUSER_EMAIL}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD}
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - madrid-internal     # tráfico privado con el frontend
      - dokploy-network     # solo para alcanzar la BD (app-madrid-db-qfgme1)
    expose:
      - "8000"

  madrid-frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - madrid-backend
    networks:
      - madrid-internal     # nginx → madrid-backend:8000 (privado)
      - dokploy-network     # exposición vía Traefik (dominio en la UI)
    # El dominio madrid.ose.net.pe se asigna a ESTE servicio desde la pestaña
    # "Domains" de Dokploy (Service: madrid-frontend · Port: 80). Sin labels.

volumes:
  backend_uploads:

networks:
  # Red privada de ESTE proyecto (aislada del resto). Overlay = requerido en
  # Swarm para comunicación entre servicios.
  madrid-internal:
    driver: overlay
    attachable: true
  # Red compartida de Dokploy (Traefik + la BD ya creada). Debe existir.
  dokploy-network:
    external: true
