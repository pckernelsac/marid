# ── Madrid Dental Studio · Producción (Dokploy / Docker Swarm) ────────
# La base de datos PostgreSQL ya existe como servicio aparte en Dokploy
# (host: app-madrid-db-qfgme1); el backend la alcanza por `dokploy-network`.
#
# IMPORTANTE (lección aprendida):
#  • Dokploy usa Docker Swarm: cada servicio registra su NOMBRE como alias DNS
#    en `dokploy-network`. Por eso los servicios llevan nombres ÚNICOS con
#    prefijo `madrid-` — si se llamaran `frontend`/`backend` colisionarían con
#    los de otras apps en la misma red (cruce: una app cargando otra).
#  • El dominio se configura SOLO desde la pestaña "Domains" de Dokploy
#    (Service: madrid-frontend · Port: 80 · HTTPS + Let's Encrypt). NO se
#    declaran labels de Traefik aquí: Dokploy los inyecta y duplicarlos da 404.
#  • Variables de entorno: pestaña "Environment" de Dokploy (ver
#    .env.production.example). Dokploy las escribe en un .env que se interpola
#    en los ${VAR}. No se usa env_file (gitignored, no está en el repo).

services:
  madrid-backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-Madrid Dental Studio}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-3}
      POSTGRES_SERVER: ${POSTGRES_SERVER}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-[]}
      FIRST_SUPERUSER_EMAIL: ${FIRST_SUPERUSER_EMAIL}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD}
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - dokploy-network

  madrid-frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - madrid-backend
    networks:
      - dokploy-network
    # El dominio madrid.ose.net.pe se asigna a ESTE servicio desde la pestaña
    # "Domains" de Dokploy (Port 80). Sin labels manuales aquí.

volumes:
  backend_uploads:

networks:
  # Única red: la de Dokploy (Traefik + la BD ya creada). Debe existir.
  # nginx resuelve `madrid-backend` por su alias en esta red.
  dokploy-network:
    external: true
