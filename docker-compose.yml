services:
  db:
    image: postgres:16-alpine
    container_name: madrid_dental_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: madrid_dental
    ports:
      - "5433:5432"
    volumes:
      - madrid_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d madrid_dental"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  madrid_pgdata:
