# Serves the SPA and reverse-proxies the API to the backend container.
# Same-origin design: the browser only ever talks to this nginx, so there
# is no CORS and no hardcoded backend URL in the frontend bundle.

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Radiograph uploads are capped at 20MB server-side; allow a little headroom.
    client_max_body_size 25m;

    # gzip for text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/xml image/svg+xml;

    # ── API + uploaded files → FastAPI backend ────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /uploads/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://backend;
        access_log off;
    }

    # ── Hashed build assets: cache hard ───────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback: every other route returns index.html ────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
